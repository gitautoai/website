name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          # Vercel CLI reads .git to detect the commit author and blocks deploys on the Hobby plan if the author isn't the team owner (info@gitauto.ai)
          rm -rf .git
          deployment_url=$(vercel --yes --token=${{ secrets.VERCEL_TOKEN }} ${{ github.ref == 'refs/heads/main' && '--prod' || '' }})
          echo "deployment_url=$deployment_url" >> $GITHUB_OUTPUT

      - name: Notify Slack on Failure
        if: failure()
        env:
          DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Preview' }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          message="<!channel> :x: ${DEPLOY_ENV} deployment failed"
          if [ -n "$DEPLOY_URL" ]; then
            message="${message} - ${DEPLOY_URL}"
          fi
          jq -n --arg text "$message" '{"channel": "C08PHH352S3", "text": $text}' | \
          curl -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" -H 'Content-type: application/json' -d @- https://slack.com/api/chat.postMessage
